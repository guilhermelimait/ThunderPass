<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThunderPass - Profile Lookup</title>
  <style>
    :root { --bg:#0d0d0d;--surface:#1a1a1a;--card:#222;--yellow:#FFD400;--text:#f0f0f0;--muted:#888;--radius:14px; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 80px}
    header{text-align:center;margin-bottom:36px}
    header .bolt{font-size:3rem}
    header h1{font-size:2rem;font-weight:800;color:var(--yellow)}
    header p{color:var(--muted);margin-top:4px;font-size:.9rem}
    .search-row{display:flex;gap:8px;width:100%;max-width:480px;margin-bottom:32px}
    .search-row input{flex:1;padding:12px 16px;border-radius:var(--radius);border:1px solid #333;background:var(--surface);color:var(--text);font-size:1rem;outline:none}
    .search-row input:focus{border-color:var(--yellow)}
    .search-row button{padding:12px 20px;border-radius:var(--radius);border:none;background:var(--yellow);color:#000;font-weight:700;cursor:pointer;font-size:1rem}
    #status{color:var(--muted);font-size:.9rem;margin-bottom:12px}
    #card{display:none;background:var(--card);border-radius:var(--radius);width:100%;max-width:480px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .card-header{background:linear-gradient(135deg,#1a1a1a 0%,#111 100%);border-bottom:2px solid var(--yellow);padding:24px 20px 16px;display:flex;align-items:center;gap:16px}
    .avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--yellow);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;flex-shrink:0}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .card-header h2{font-size:1.25rem;font-weight:800}
    .card-header p{color:var(--muted);font-size:.85rem;margin-top:2px}
    .stats-row{display:flex;border-bottom:1px solid #2a2a2a}
    .stat{flex:1;text-align:center;padding:14px 8px;border-right:1px solid #2a2a2a}
    .stat:last-child{border-right:none}
    .stat .val{font-size:1.4rem;font-weight:800;color:var(--yellow)}
    .stat .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .section{padding:16px 20px;border-bottom:1px solid #2a2a2a}
    .section:last-child{border-bottom:none}
    .section h3{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .stickers{display:flex;flex-wrap:wrap;gap:8px}
    .sticker{background:var(--surface);border:1px solid #333;border-radius:20px;padding:5px 12px;font-size:.8rem;display:flex;align-items:center;gap:5px}
    .ghost-card{background:var(--surface);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px}
    .ghost-card .ghost-icon{font-size:1.8rem}
    .ghost-card .game{font-weight:600}
    .ghost-card .score{color:var(--yellow);font-size:.9rem}
    .share-link{word-break:break-all;color:var(--yellow);font-size:.8rem}
    .sync-time{color:var(--muted);font-size:.75rem;margin-top:6px}
  </style>
</head>
<body>
<header><div class="bolt">&#9889;</div><h1>ThunderPass</h1><p>Look up a player profile by their Installation ID</p></header>
<div class="search-row">
  <input id="idInput" type="text" placeholder="Paste installation ID..." />
  <button onclick="lookup()">Look up</button>
</div>
<div id="status"></div>
<div id="card">
  <div class="card-header">
    <div class="avatar" id="avatarWrap">&#9889;</div>
    <div><h2 id="cardName"></h2><p id="cardGreeting"></p></div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="val" id="statSparks">0</div><div class="lbl">Sparks</div></div>
    <div class="stat"><div class="val" id="statJoules">0</div><div class="lbl">Joules</div></div>
    <div class="stat"><div class="val" id="statStickers">0</div><div class="lbl">Stickers</div></div>
  </div>
  <div class="section" id="ghostSection" style="display:none">
    <h3>Ghost</h3>
    <div class="ghost-card"><div class="ghost-icon">&#128123;</div><div><div class="game" id="ghostGame"></div><div class="score" id="ghostScore"></div></div></div>
  </div>
  <div class="section" id="stickersSection" style="display:none"><h3>Sticker Book</h3><div class="stickers" id="stickerList"></div></div>
  <div class="section" id="retroSection" style="display:none"><h3>RetroAchievements</h3><a id="retroLink" href="#" target="_blank" rel="noopener" style="color:var(--yellow)"></a></div>
  <div class="section">
    <h3>Share this profile</h3>
    <div class="share-link" id="shareUrl"></div>
    <div class="sync-time" id="syncTime"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://wrunnzrxuapqpxoxvzpa.supabase.co';
const ANON_KEY='REDACTED_ANON_KEY';
const STICKER_MAP={first_spark:{icon:'⚡',name:'First Spark'},player_2:{icon:'🎮',name:'Player 2'},night_owl:{icon:'🦉',name:'Night Owl'},world_traveler:{icon:'🌍',name:'World Traveler'},glitch_hunter:{icon:'🐛',name:'Glitch Hunter'},power_surge:{icon:'🔋',name:'Power Surge'},ghost_buster:{icon:'👻',name:'Ghost Buster'},retro_fan:{icon:'🕹️',name:'Retro Fan'},social_spark:{icon:'🤝',name:'Social Spark'},early_adopter:{icon:'🚀',name:'Early Adopter'},marathon:{icon:'🏃',name:'Marathon'},collector:{icon:'🏆',name:'Collector'}};
window.addEventListener('DOMContentLoaded',()=>{
  const id=new URLSearchParams(window.location.search).get('id');
  if(id){document.getElementById('idInput').value=id;lookup();}
  document.getElementById('idInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookup();});
});
async function lookup(){
  const id=document.getElementById('idInput').value.trim();
  if(!id)return;
  setStatus('Searching...');hideCard();
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/profiles?installation_id=eq.${encodeURIComponent(id)}&select=*&limit=1`,{headers:{'apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    if(!rows||rows.length===0){setStatus('No profile found for that Installation ID.');return;}
    renderCard(rows[0]);
    history.replaceState(null,'','?id='+encodeURIComponent(id));
    document.getElementById('shareUrl').textContent=window.location.href;
  }catch(e){setStatus('Error: '+e.message);}
}
function renderCard(p){
  setStatus('');
  document.getElementById('cardName').textContent=p.display_name||'Traveler';
  document.getElementById('cardGreeting').textContent=p.greeting||'';
  const kind=(p.avatar_kind||'defaultBolt');
  const color=(p.avatar_color||'#FFD400').replace('#','');
  document.getElementById('avatarWrap').innerHTML='<img src="https://api.dicebear.com/9.x/identicon/svg?seed='+encodeURIComponent(kind)+'&backgroundColor='+color+'" alt="avatar"/>';
  document.getElementById('statSparks').textContent=(p.encounter_count||0).toLocaleString();
  document.getElementById('statJoules').textContent=(p.joules_total||0).toLocaleString();
  const stickers=(p.stickers_json||'').split(',').filter(s=>s.trim());
  document.getElementById('statStickers').textContent=stickers.length;
  if(p.ghost_game){document.getElementById('ghostGame').textContent=p.ghost_game;document.getElementById('ghostScore').textContent=p.ghost_score?'Score: '+p.ghost_score.toLocaleString():'';document.getElementById('ghostSection').style.display='';}else document.getElementById('ghostSection').style.display='none';
  if(stickers.length>0){const list=document.getElementById('stickerList');list.innerHTML='';stickers.forEach(k=>{const s=STICKER_MAP[k.trim()]||{icon:'🏷',name:k};const el=document.createElement('div');el.className='sticker';el.textContent=s.icon+' '+s.name;list.appendChild(el);});document.getElementById('stickersSection').style.display='';}else document.getElementById('stickersSection').style.display='none';
  if(p.retro_username){const a=document.getElementById('retroLink');a.href='https://retroachievements.org/user/'+encodeURIComponent(p.retro_username);a.textContent='retroachievements.org/user/'+p.retro_username;document.getElementById('retroSection').style.display='';}else document.getElementById('retroSection').style.display='none';
  if(p.updated_at)document.getElementById('syncTime').textContent='Last synced: '+new Date(p.updated_at*1000).toLocaleString();
  showCard();
}
function setStatus(m){document.getElementById('status').textContent=m;}
function showCard(){document.getElementById('card').style.display='';}
function hideCard(){document.getElementById('card').style.display='none';}
</script>
</body>
</html>
