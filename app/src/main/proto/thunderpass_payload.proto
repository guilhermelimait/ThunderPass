syntax = "proto3";

option java_package = "com.thunderpass.ble.proto";
option java_multiple_files = true;

message AvatarProto {
  string kind = 1;
  string color = 2;
  optional string seed = 3;
}

message ProfileDataProto {
  string display_name = 1;
  string greeting = 2;
  AvatarProto avatar = 3;

  // Privacy flag
  bool is_private = 4;

  // Stats
  int64 volts = 5;
  optional int32 passes = 6;
  optional int32 badges = 7;
  optional int32 streak = 8;

  // Identity & Retro
  optional string retro_username = 9;
  optional string ghost_game = 10;
  optional int64 ghost_score = 11;
  optional string inst_id = 12;
  optional string device_type = 13;
  optional string country = 14;
  optional string city = 15;

  // Paired-device delta sync fields
  optional string group_tag = 16;
  optional int64 updated_at = 17;
  optional string sync_badges = 18;
  optional string sync_stickers = 19;
  optional bool sync_privacy_mode = 20;
}

message BlePayloadProto {
  int32 v = 1;
  string type = 2;
  string rotating_id = 3;
  int64 ts = 4;
  string pub_key = 5;
  string sig = 6;
  ProfileDataProto data = 7;
}
